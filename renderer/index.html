<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>スケール壁紙ジェネレータ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>スケール壁紙ジェネレータ</h1>

  <div class="controls">
    <label>アスペクト比
      <select id="aspectRatio">
        <option value="16:9">16:9（ワイド）</option>
        <option value="16:10">16:10</option>
        <option value="4:3">4:3</option>
        <option value="21:9">21:9（ウルトラワイド）</option>
        <option value="1:1">1:1（スクエア）</option>
      </select>
    </label>
    <label>横ピクセル数 <input id="width" type="number" value="1920" min="1"></label>
    <label>縦ピクセル数 <input id="height" type="number" value="1080" min="1"></label>
    <label>対角インチ数 <input id="diagonal" type="number" value="24" min="1" step="0.1"></label>
    <button id="generate">グリッドを生成</button>
    <button id="download" disabled>PNGをダウンロード</button>
  </div>

  <canvas id="paper"></canvas>

  <script src="renderer.js"></script>
</body>
</html>
